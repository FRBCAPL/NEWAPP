<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eightball-shade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="80%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="eightball-highlight" cx="35%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="numberShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#888" flood-opacity="0.4"/>
    </filter>
  </defs>
  <ellipse cx="64" cy="70" rx="44" ry="12" fill="#222" fill-opacity="0.25"/>
  <circle cx="64" cy="64" r="56" fill="url(#eightball-shade)"/>
  <ellipse cx="54" cy="54" rx="18" ry="10" fill="url(#eightball-highlight)"/>
  <circle cx="64" cy="64" r="22" fill="#fff" stroke="#eee" stroke-width="2"/>
  <!-- SVG path for number 8, smaller and centered -->
  <g filter="url(#numberShadow)">
    <path d="M64 58
      a5 5 0 1 1 0 10
      a5 5 0 1 1 0 -10
      M64 66
      a3.5 3.5 0 1 0 0.01 0
      a3.5 3.5 0 1 0 -0.01 0" 
      fill="#fff" stroke="#111" stroke-width="2.2"/>
  </g>
</svg>
